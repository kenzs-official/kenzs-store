<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenzs Official | Premium Footwear</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF8F5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initial Sample Products
        const initialProducts = [
            { id: 1, name: "Classic Monk Strap", price: 120, category: "Formal Shoes", image: "https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=600&auto=format&fit=crop&q=60", description: "Premium handcrafted leather shoes designed for every formal occasion." },
            { id: 2, name: "Urban Heritage Boot", price: 145, category: "Boots", image: "https://images.unsplash.com/photo-1608256246200-53e635b5b65f?w=600&auto=format&fit=crop&q=60", description: "Rugged elegance featuring top-grain leather construction and comfortable support." }
        ];

        function App() {
            const [view, setView] = useState('home'); // 'home', 'shop', 'admin', 'cart'
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('kenzs_products');
                return saved ? JSON.parse(saved) : initialProducts;
            });
            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('kenzs_cart');
                return saved ? JSON.parse(saved) : [];
            });

            // Admin Security
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');

            // New Product Form State
            const [newProduct, setNewProduct] = useState({ name: '', price: '', category: 'Formal Shoes', image: '', description: '' });

            useEffect(() => {
                localStorage.setItem('kenzs_products', JSON.stringify(products));
            }, [products]);

            useEffect(() => {
                localStorage.setItem('kenzs_cart', JSON.stringify(cart));
            }, [cart]);

            // Cart Functions
            const addToCart = (product) => {
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.id === product.id);
                    if (existing) {
                        return prevCart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prevCart, { ...product, quantity: 1 }];
                });
                alert(`${product.name} added to cart!`);
            };

            const updateQuantity = (id, amount) => {
                setCart(prevCart => prevCart.map(item => {
                    if (item.id === id) {
                        const newQty = item.quantity + amount;
                        return newQty > 0 ? { ...item, quantity: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            // Admin Authentication Check
            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'kenzs2026') { // Set your password here
                    setIsAdminAuthenticated(true);
                    setAuthError('');
                } else {
                    setAuthError('Incorrect Password. Access Denied.');
                }
            };

            // Handle Local Image Upload conversion to Base64 data-string
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewProduct({ ...newProduct, image: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProduct.name || !newProduct.price || !newProduct.image) {
                    alert('Please fill out all required fields and upload an image.');
                    return;
                }
                const productToAdd = {
                    ...newProduct,
                    id: Date.now(),
                    price: parseFloat(newProduct.price)
                };
                setProducts([productToAdd, ...products]);
                setNewProduct({ name: '', price: '', category: 'Formal Shoes', image: '', description: '' });
                alert('Product added successfully!');
            };

            const deleteProduct = (id) => {
                if(confirm('Are you sure you want to remove this product?')) {
                    setProducts(products.filter(p => p.id !== id));
                }
            };

            const checkoutWhatsApp = () => {
                let message = "New Order from Kenzs Official:\n\n";
                cart.forEach(item => {
                    message += `- ${item.name} (Qty: ${item.quantity}) - $${item.price * item.quantity}\n`;
                });
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                message += `\nTotal Value: $${total}`;
                
                const encodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
            };

            return (
                <div className="min-h-screen flex flex-col pb-20 md:pb-0">
                    {/* Header Nav */}
                    <header className="bg-white border-b border-stone-200 sticky top-0 z-40 px-4 py-4 flex justify-between items-center">
                        <h1 className="text-xl font-bold tracking-tight text-amber-900 cursor-pointer" onClick={() => setView('home')}>KENZS OFFICIAL</h1>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('cart')} className="relative p-2 text-stone-700">
                                🛒 {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-amber-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                            </button>
                            <button onClick={() => setView('admin')} className="bg-stone-100 text-stone-800 px-3 py-1.5 rounded-full text-xs font-semibold border border-stone-200">⚙️ Admin</button>
                        </div>
                    </header>

                    {/* View Router Container */}
                    <main className="flex-1 max-w-4xl w-full mx-auto p-4">
                        {view === 'home' && (
                            <div className="space-y-8 animate-fadeIn">
                                <div className="text-center py-12 px-4 space-y-4 bg-stone-100 rounded-3xl">
                                    <h2 className="text-3xl font-bold text-stone-900 tracking-tight">Walk with Confidence.</h2>
                                    <p className="text-stone-600 text-sm max-w-sm mx-auto">Premium Men's Shoes Designed for Every Occasion.</p>
                                    <button onClick={() => setView('shop')} className="bg-amber-800 text-white font-medium px-8 py-3 rounded-full text-sm shadow-md hover:bg-amber-950 transition">Shop Collection</button>
                                </div>

                                <div>
                                    <h3 className="text-lg font-bold text-stone-900 mb-4">Featured Footwear</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {products.slice(0, 2).map(product => (
                                            <div key={product.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                                <img src={product.image} className="w-full h-56 object-cover" alt={product.name} />
                                                <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                    <div>
                                                        <span className="text-xs font-bold uppercase tracking-wider text-amber-800 bg-amber-50 px-2 py-1 rounded">{product.category}</span>
                                                        <h4 className="font-bold text-stone-900 text-base mt-2">{product.name}</h4>
                                                        <p className="text-stone-500 text-xs mt-1 line-clamp-2">{product.description}</p>
                                                    </div>
                                                    <div className="flex items-center justify-between pt-2">
                                                        <span className="text-lg font-bold text-stone-900">${product.price}</span>
                                                        <button onClick={() => addToCart(product)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full hover:bg-stone-800">Add to Cart</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'shop' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">Explore Catalog</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {products.map(product => (
                                        <div key={product.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                            <img src={product.image} className="w-full h-56 object-cover" alt={product.name} />
                                            <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                <div>
                                                    <span className="text-xs font-bold uppercase tracking-wider text-amber-800 bg-amber-50 px-2 py-1 rounded">{product.category}</span>
                                                    <h4 className="font-bold text-stone-900 text-base mt-2">{product.name}</h4>
                                                    <p className="text-stone-500 text-xs mt-1">{product.description}</p>
                                                </div>
                                                <div className="flex items-center justify-between pt-2">
                                                    <span className="text-lg font-bold text-stone-900">${product.price}</span>
                                                    <button onClick={() => addToCart(product)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full">Add to Cart</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">Your Shopping Cart</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-12 space-y-4">
                                        <p className="text-stone-500">Your cart is completely empty.</p>
                                        <button onClick={() => setView('shop')} className="bg-stone-900 text-white text-xs font-bold px-6 py-2.5 rounded-full">Go to Catalog</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map(item => (
                                            <div key={item.id} className="bg-white p-4 rounded-xl border border-stone-200 flex gap-4 items-center">
                                                <img src={item.image} className="w-16 h-16 object-cover rounded-lg bg-stone-100" />
                                                <div className="flex-1">
                                                    <h4 className="font-bold text-stone-900 text-sm">{item.name}</h4>
                                                    <p className="text-stone-500 text-xs">${item.price} x {item.quantity}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => updateQuantity(item.id, -1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center text-sm font-bold">-</button>
                                                    <span className="text-sm font-semibold w-4 text-center">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(item.id, 1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center text-sm font-bold">+</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="border-t border-stone-200 pt-4 flex flex-col items-end space-y-3">
                                            <div className="text-right">
                                                <span className="text-stone-500 text-sm">Grand Total: </span>
                                                <span className="text-xl font-bold text-stone-900">${cart.reduce((sum, i) => sum + (i.price * i.quantity), 0)}</span>
                                            </div>
                                            <button onClick={checkoutWhatsApp} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-center text-sm shadow hover:bg-emerald-700">Submit Order via WhatsApp</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">Store Management Panel</h2>
                                
                                {!isAdminAuthenticated ? (
                                    <form onSubmit={handleAdminLogin} className="bg-white p-6 rounded-2xl border border-stone-200 max-w-sm mx-auto space-y-4 shadow-sm">
                                        <p className="text-xs text-stone-500 font-medium">Authentication required. Please enter the management access key.</p>
                                        <div>
                                            <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Access Key</label>
                                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-amber-800" placeholder="••••••••" />
                                        </div>
                                        {authError && <p className="text-xs text-red-600 font-medium">{authError}</p>}
                                        <button type="submit" className="w-full bg-amber-900 text-white text-xs font-bold py-2.5 rounded-lg">Unlock Dashboard</button>
                                    </form>
                                ) : (
                                    <div className="space-y-8 animate-fadeIn">
                                        {/* Create Form */}
                                        <form onSubmit={handleAddProduct} className="bg-white p-5 rounded-2xl border border-stone-200 space-y-4 shadow-sm">
                                            <h3 className="text-base font-bold text-stone-900 border-b pb-2">Add New Catalog Item</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Product Title *</label>
                                                    <input type="text" value={newProduct.name} onChange={(e) => setNewProduct({...newProduct, name: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="e.g. Italian Leather Loafer" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Retail Price ($) *</label>
                                                    <input type="number" value={newProduct.price} onChange={(e) => setNewProduct({...newProduct, price: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="135" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Category Group</label>
                                                    <select value={newProduct.category} onChange={(e) => setNewProduct({...newProduct, category: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white">
                                                        <option value="Formal Shoes">Formal Shoes</option>
                                                        <option value="Boots">Boots</option>
                                                        <option value="Sneakers">Sneakers</option>
                                                        <option value="Loafers">Loafers</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Product Media Image *</label>
                                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-50 file:text-amber-900 hover:file:bg-amber-100" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-700 uppercase mb-1">Description</label>
                                                <textarea value={newProduct.description} onChange={(e) => setNewProduct({...newProduct, description: e.target.value})} rows="2" className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="Provide features, materials used, fitting size information..."></textarea>
                                            </div>
                                            <button type="submit" className="bg-emerald-600 text-white text-xs font-bold px-6 py-2.5 rounded-lg hover:bg-emerald-700 transition">Save & Publish Item</button>
                                        </form>

                                        {/* Product Inventory List Management */}
                                        <div className="space-y-3">
                                            <h3 className="text-base font-bold text-stone-900">Current Live Inventory ({products.length})</h3>
                                            <div className="space-y-2">
                                                {products.map(product => (
                                                    <div key={product.id} className="bg-white p-3 rounded-xl border border-stone-200 flex items-center justify-between gap-4 shadow-sm">
                                                        <div className="flex items-center gap-3">
                                                            <img src={product.image} className="w-12 h-12 object-cover rounded-lg bg-stone-50" />
                                                            <div>
                                                                <h4 className="font-bold text-stone-900 text-sm">{product.name}</h4>
                                                                <p className="text-xs text-stone-500">{product.category} • ${product.price}</p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => deleteProduct(product.id)} className="text-red-600 text-xs font-bold bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100">Remove</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Fixed Mobile Bottom Bar Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 py-2 px-6 flex justify-between items-center z-40 md:hidden shadow-lg">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-0.5 text-xs font-medium ${view === 'home' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span className="text-lg">🏠</span>Home
                        </button>
                        <button onClick={() => setView('shop')} className={`flex flex-col items-center gap-0.5 text-xs font-medium ${view === 'shop' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span className="text-lg">👟</span>Shop
                        </button>
                        <button onClick={() => setView('cart')} className={`flex flex-col items-center gap-0.5 text-xs font-medium ${view === 'cart' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span className="text-lg">🛒</span>Cart
                        </button>
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center gap-0.5 text-xs font-medium ${view === 'admin' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span className="text-lg">⚙️</span>Admin
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>    
Fix active catalog and secure admin
