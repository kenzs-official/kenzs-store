<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenzs Official | ፕሪሚየም ጫማዎች</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF8F5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Sample initial products with arrays for multiple images
        const initialProducts = [
            { 
                id: 1, 
                name: "ክላሲክ ሞንክ ስትራፕ (Classic Monk Strap)", 
                price: 3500, 
                category: "ፎርማል ጫማዎች", 
                images: ["https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=600&auto=format&fit=crop&q=60"], 
                description: "ለማንኛውም መደበኛ ዝግጅት የተሰሩ ምርጥ በእጅ የተሰሩ የቆዳ ጫማዎች።" 
            }
        ];

        function App() {
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState(() => {
                const saved = localStorage.getItem('kenzs_products');
                return saved ? JSON.parse(saved) : initialProducts;
            });
            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('kenzs_cart');
                return saved ? JSON.parse(saved) : [];
            });

            // Selected sizes for product detail viewing state
            const [selectedSizes, setSelectedSizes] = useState({});
            // Selected active image index for each product image gallery
            const [activeImageIndexes, setActiveImageIndexes] = useState({});

            // Admin Settings
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [newProduct, setNewProduct] = useState({ name: '', price: '', category: 'ፎርማል ጫማዎች', images: [], description: '' });

            useEffect(() => { localStorage.setItem('kenzs_products', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('kenzs_cart', JSON.stringify(cart)); }, [cart]);

            const addToCart = (product) => {
                const size = selectedSizes[product.id] || "39"; // Default size if not touched
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.id === product.id && item.size === size);
                    if (existing) {
                        return prevCart.map(item => (item.id === product.id && item.size === size) ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prevCart, { ...product, quantity: 1, size: size }];
                });
                alert(`${product.name} (መጠን: ${size}) ወደ ቅርጫት ገብቷል!`);
            };

            const updateQuantity = (id, size, amount) => {
                setCart(prevCart => prevCart.map(item => {
                    if (item.id === id && item.size === size) {
                        const newQty = item.quantity + amount;
                        return newQty > 0 ? { ...item, quantity: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'kenzs2026') {
                    setIsAdminAuthenticated(true);
                    setAuthError('');
                } else {
                    setAuthError('የይለፍ ቃል የተሳሳተ ነው!');
                }
            };

            // Handle uploading multiple images
            const handleMultipleImagesUpload = (e) => {
                const files = Array.from(e.target.files);
                const filePromises = files.map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                });

                Promise.all(filePromises).then(base64Images => {
                    setNewProduct(prev => ({ ...prev, images: [...prev.images, ...base64Images].slice(0, 3) })); // Limit to 3 images
                });
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProduct.name || !newProduct.price || newProduct.images.length === 0) {
                    alert('እባክዎ ሁሉንም መስኮች ይሙሉ እና ቢያንስ አንድ ምስል ያስገቡ!');
                    return;
                }
                const productToAdd = { ...newProduct, id: Date.now(), price: parseFloat(newProduct.price) };
                setProducts([productToAdd, ...products]);
                setNewProduct({ name: '', price: '', category: 'ፎርማል ጫማዎች', images: [], description: '' });
                alert('ምርት በተሳካ ሁኔታ ተጨምሯል!');
            };

            // Formatting message template for purchasing
            const generateOrderText = () => {
                let message = "አዲስ ትዕዛዝ ከ Kenzs Official:\n\n";
                cart.forEach(item => {
                    message += `- ${item.name}\n  መጠን (Size): ${item.size} | ብዛት: ${item.quantity} | ዋጋ: ${item.price * item.quantity} ETB\n`;
                });
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                message += `\nጠቅላላ ድምር: ${total} ETB`;
                return message;
            };

            const checkoutWhatsApp = () => {
                const encoded = encodeURIComponent(generateOrderText());
                window.open(`https://wa.me/?text=${encoded}`, '_blank');
            };

            const checkoutSMS = () => {
                const encoded = encodeURIComponent(generateOrderText());
                window.open(`sms:?body=${encoded}`, '_blank');
            };

            return (
                <div className="min-h-screen flex flex-col pb-20 md:pb-0">
                    {/* Header */}
                    <header className="bg-white border-b border-stone-200 sticky top-0 z-40 px-4 py-4 flex justify-between items-center">
                        <h1 className="text-xl font-bold tracking-tight text-amber-900 cursor-pointer" onClick={() => setView('home')}>KENZS OFFICIAL</h1>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('cart')} className="relative p-2 text-stone-700">
                                🛒 {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-amber-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                            </button>
                            <button onClick={() => setView('admin')} className="bg-stone-100 text-stone-800 px-3 py-1.5 rounded-full text-xs font-semibold border border-stone-200">⚙️ መቆጣጠሪያ</button>
                        </div>
                    </header>

                    {/* Main Frame Router */}
                    <main className="flex-1 max-w-4xl w-full mx-auto p-4">
                        {view === 'home' && (
                            <div className="space-y-8">
                                <div className="text-center py-12 px-4 space-y-4 bg-stone-100 rounded-3xl">
                                    <h2 className="text-3xl font-bold text-stone-900 tracking-tight">በራስ መተማመን ይራመዱ።</h2>
                                    <p className="text-stone-600 text-sm max-w-sm mx-auto">ለማንኛውም ዝግጅት የሚሆኑ የክብር ወንዶች ጫማዎች።</p>
                                    <button onClick={() => setView('shop')} className="bg-amber-800 text-white font-medium px-8 py-3 rounded-full text-sm shadow-md">ካታሎግ ይመልከቱ</button>
                                </div>

                                <div>
                                    <h3 className="text-lg font-bold text-stone-900 mb-4">የተመረጡ ጫማዎች</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {products.slice(0, 4).map(product => {
                                            const currentImgIdx = activeImageIndexes[product.id] || 0;
                                            return (
                                                <div key={product.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                                    {/* Image Gallery Setup */}
                                                    <div className="relative w-full h-56 bg-stone-100">
                                                        <img src={product.images[currentImgIdx]} className="w-full h-full object-cover" />
                                                        {product.images.length > 1 && (
                                                            <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                                                                {product.images.map((_, idx) => (
                                                                    <button key={idx} onClick={() => setActiveImageIndexes({...activeImageIndexes, [product.id]: idx})} className={`w-2 h-2 rounded-full ${idx === currentImgIdx ? 'bg-amber-800 scale-125' : 'bg-stone-300'}`}></button>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                        <div>
                                                            <span className="text-xs font-bold text-amber-800 bg-amber-50 px-2 py-1 rounded">{product.category}</span>
                                                            <h4 className="font-bold text-stone-900 text-base mt-2">{product.name}</h4>
                                                            <p className="text-stone-500 text-xs mt-1">{product.description}</p>
                                                            
                                                            {/* Size Selection Widget */}
                                                            <div className="mt-3">
                                                                <label className="block text-xs font-bold text-stone-600 mb-1">መጠን (Size) ይምረጡ፡</label>
                                                                <div className="flex gap-1.5 flex-wrap">
                                                                    {["39", "40", "41", "42", "43", "44"].map(sz => (
                                                                        <button key={sz} onClick={() => setSelectedSizes({...selectedSizes, [product.id]: sz})} className={`px-2.5 py-1 text-xs font-medium rounded-md border ${(selectedSizes[product.id] || "39") === sz ? 'bg-amber-800 text-white border-amber-800' : 'bg-white text-stone-700 border-stone-200'}`}>{sz}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center justify-between pt-2 border-t border-stone-50">
                                                            <span className="text-base font-bold text-stone-900">{product.price} ETB</span>
                                                            <button onClick={() => addToCart(product)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full">ወደ ቅርጫት ጨምር</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'shop' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">ሙሉ ካታሎግ</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {products.map(product => {
                                        const currentImgIdx = activeImageIndexes[product.id] || 0;
                                        return (
                                            <div key={product.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                                <div className="relative w-full h-56 bg-stone-100">
                                                    <img src={product.images[currentImgIdx]} className="w-full h-full object-cover" />
                                                    {product.images.length > 1 && (
                                                        <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                                                            {product.images.map((_, idx) => (
                                                                <button key={idx} onClick={() => setActiveImageIndexes({...activeImageIndexes, [product.id]: idx})} className={`w-2 h-2 rounded-full ${idx === currentImgIdx ? 'bg-amber-800 scale-125' : 'bg-stone-300'}`}></button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                    <div>
                                                        <span className="text-xs font-bold text-amber-800 bg-amber-50 px-2 py-1 rounded">{product.category}</span>
                                                        <h4 className="font-bold text-stone-900 text-base mt-2">{product.name}</h4>
                                                        <p className="text-stone-500 text-xs mt-1">{product.description}</p>
                                                        
                                                        <div className="mt-3">
                                                            <label className="block text-xs font-bold text-stone-600 mb-1">መጠን (Size) ይምረጡ፡</label>
                                                            <div className="flex gap-1.5 flex-wrap">
                                                                {["39", "40", "41", "42", "43", "44"].map(sz => (
                                                                    <button key={sz} onClick={() => setSelectedSizes({...selectedSizes, [product.id]: sz})} className={`px-2.5 py-1 text-xs font-medium rounded-md border ${(selectedSizes[product.id] || "39") === sz ? 'bg-amber-800 text-white border-amber-800' : 'bg-white text-stone-700 border-stone-200'}`}>{sz}</button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center justify-between pt-2 border-t border-stone-50">
                                                        <span className="text-base font-bold text-stone-900">{product.price} ETB</span>
                                                        <button onClick={() => addToCart(product)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full">ወደ ቅርጫት ጨምር</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">የእርስዎ የገበያ ቅርጫት</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-12 space-y-4">
                                        <p className="text-stone-500">ቅርጫትዎ ባዶ ነው!</p>
                                        <button onClick={() => setView('shop')} className="bg-stone-900 text-white text-xs font-bold px-6 py-2.5 rounded-full">ወደ ግብይት ተመለስ</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map((item, idx) => (
                                            <div key={`${item.id}-${item.size}-${idx}`} className="bg-white p-4 rounded-xl border border-stone-200 flex gap-4 items-center">
                                                <img src={item.images[0]} className="w-16 h-16 object-cover rounded-lg" />
                                                <div className="flex-1">
                                                    <h4 className="font-bold text-stone-900 text-sm">{item.name}</h4>
                                                    <p className="text-stone-500 text-xs">መጠን: <span className="font-bold text-amber-900">{item.size}</span></p>
                                                    <p className="text-stone-500 text-xs">{item.price} ETB x {item.quantity}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => updateQuantity(item.id, item.size, -1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center font-bold">-</button>
                                                    <span className="text-sm font-semibold">{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(item.id, item.size, 1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center font-bold">+</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="border-t border-stone-200 pt-4 flex flex-col items-end space-y-3">
                                            <div className="text-right">
                                                <span className="text-stone-500 text-sm">ጠቅላላ ድምር: </span>
                                                <span className="text-xl font-bold text-stone-900">{cart.reduce((sum, i) => sum + (i.price * i.quantity), 0)} ETB</span>
                                            </div>
                                            <div className="w-full grid grid-cols-2 gap-2">
                                                <button onClick={checkoutWhatsApp} className="bg-emerald-600 text-white font-bold py-3 rounded-xl text-center text-xs shadow">በ WhatsApp እዘዝ</button>
                                                <button onClick={checkoutSMS} className="bg-blue-600 text-white font-bold py-3 rounded-xl text-center text-xs shadow">በእጅ ስልክ / SMS እዘዝ</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">የሱቅ መቆጣጠሪያ ፓነል</h2>
                                
                                {!isAdminAuthenticated ? (
                                    <form onSubmit={handleAdminLogin} className="bg-white p-6 rounded-2xl border border-stone-200 max-w-sm mx-auto space-y-4 shadow-sm">
                                        <div>
                                            <label className="block text-xs font-bold text-stone-700 uppercase mb-1">የመግቢያ ቁልፍ (Access Key)</label>
                                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-amber-800" placeholder="••••••••" />
                                        </div>
                                        {authError && <p className="text-xs text-red-600 font-medium">{authError}</p>}
                                        <button type="submit" className="w-full bg-amber-900 text-white text-xs font-bold py-2.5 rounded-lg">ክፈት</button>
                                    </form>
                                ) : (
                                    <div className="space-y-8">
                                        <form onSubmit={handleAddProduct} className="bg-white p-5 rounded-2xl border border-stone-200 space-y-4 shadow-sm">
                                            <h3 className="text-base font-bold text-stone-900 border-b pb-2">አዲስ ጫማ መመዝገቢያ</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">የጫማው ስም *</label>
                                                    <input type="text" value={newProduct.name} onChange={(e) => setNewProduct({...newProduct, name: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="ምሳሌ፡ ቆዳ ጫማ" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ዋጋ (በ Birr) *</label>
                                                    <input type="number" value={newProduct.price} onChange={(e) => setNewProduct({...newProduct, price: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="3500" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ክፍል (Category)</label>
                                                    <select value={newProduct.category} onChange={(e) => setNewProduct({...newProduct, category: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white">
                                                        <option value="ፎርማል ጫማዎች">ፎርማል ጫማዎች</option>
                                                        <option value="ቡትስ">ቡትስ</option>
                                                        <option value="ስኒከር">ስኒከር</option>
                                                        <option value="ሎፈርስ">ሎፈርስ</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ምስሎች መምረጫ (እስከ 3 ምስል) *</label>
                                                    <input type="file" accept="image/*" multiple onChange={handleMultipleImagesUpload} className="w-full text-xs text-stone-500" />
                                                    <p className="text-[10px] text-amber-800 mt-1">የተመረጡ ምስሎች ብዛት፡ {newProduct.images.length}</p>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ማብራሪያ</label>
                                                <textarea value={newProduct.description} onChange={(e) => setNewProduct({...newProduct, description: e.target.value})} rows="2" className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"></textarea>
                                            </div>
                                            <button type="submit" className="bg-emerald-600 text-white text-xs font-bold px-6 py-2.5 rounded-lg">ምርቱን መዝግብ</button>
                                        </form>

                                        <div className="space-y-3">
                                            <h3 className="text-base font-bold text-stone-900">ያሉ ምርቶች ዝርዝር ({products.length})</h3>
                                            <div className="space-y-2">
                                                {products.map(product => (
                                                    <div key={product.id} className="bg-white p-3 rounded-xl border border-stone-200 flex items-center justify-between gap-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={product.images[0]} className="w-12 h-12 object-cover rounded-lg" />
                                                            <div>
                                                                <h4 className="font-bold text-stone-900 text-sm">{product.name}</h4>
                                                                <p className="text-xs text-stone-500">{product.category} • {product.price} ETB</p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => setProducts(products.filter(p => p.id !== product.id))} className="text-red-600 text-xs font-bold bg-red-50 px-3 py-1.5 rounded-lg">አጥፋ</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 py-2 px-6 flex justify-between items-center z-40 md:hidden shadow-lg">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center text-xs ${view === 'home' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>🏠</span>መነሻ
                        </button>
                        <button onClick={() => setView('shop')} className={`flex flex-col items-center text-xs ${view === 'shop' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>👟</span>ጫማዎች
                        </button>
                        <button onClick={() => setView('cart')} className={`flex flex-col items-center text-xs ${view === 'cart' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>🛒</span>ቅርጫት
                        </button>
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center text-xs ${view === 'admin' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>⚙️</span>መቆጣጠሪያ
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
