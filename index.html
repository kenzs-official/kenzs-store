            // Logo Tap tracker for Secret Admin Entry
            const [logoTapCount, setLogoTapCount] = useState(0);

            // Apply Dark Mode Class
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('darkMode', 'true');
                } else {

            // Fetch Products from Supabase on Load

            const fetchProducts = async () => {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) {
                    console.error("Error loading products: ", error);
                } else if (data && data.length > 0) {
                    setProducts(data);
                }
            };

            const fetchOrders = async () => {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) {
                    console.error("Error loading orders: ", error);
                } else if (data) {
                    setOrders(data);
                    calculateStats(data);
                }
            };

            const calculateStats = (ordersList) => {
                let today = 0, week = 0, month = 0, year = 0;
                const now = new Date();
                
                ordersList.forEach(order => {
                    if (!order.date) return;
                    
                    const datePart = order.date.split(' ')[0];
                    const orderDate = new Date(datePart);
                    
                    if (isNaN(orderDate.getTime())) return;

                    const diffTime = Math.abs(now - orderDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    const orderPrice = parseFloat(order.total) || 0;

                    if (now.toDateString() === orderDate.toDateString()) {
                        today += orderPrice;
                    }
                    if (diffDays <= 7) {
                        week += orderPrice;
                    }
                    if (diffDays <= 30) {
                        month += orderPrice;
                    }
                    if (diffDays <= 365) {
                        year += orderPrice;
                    }
                });

                setStats({ today, week, month, year });
            };

            const handleLogoTap = () => {
                const nextCount = logoTapCount + 1;
                if (nextCount >= 2) {
                    setView('admin');
                    setLogoTapCount(0); 
                } else {
                    setLogoTapCount(nextCount);
                    setTimeout(() => setLogoTapCount(0), 1500);
                }
            };

            const addToCart = (product) => {
                const size = selectedSizes[product.id] || "40";
                const itemKey = `${product.id}-${size}`;
                
                setCart(prev => {
                    const existing = prev.find(item => item.key === itemKey);
                    if (existing) {
                        return prev.map(item => item.key === itemKey ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, key: itemKey, size: size, quantity: 1 }];
                });
                alert(`${product.name} (${t[lang].size}: ${size}) ${t[lang].addedToCart}`);
            };

            const updateQty = (key, val) => {
                setCart(prev => prev.map(item => {
                    if (item.key === key) {
                        const n = item.quantity + val;
                        return n > 0 ? { ...item, quantity: n } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

                e.preventDefault();
                if (pass === 'Kenzskey0707') {

            const handleImgUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const img = new Image();
                        img.src = reader.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const max_width = 450; 
                            const scale = max_width / img.width;
                            canvas.width = max_width;
                            canvas.height = img.height * scale;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                            
                            setNewP(prev => {
                                const updatedImages = [...prev.images, compressedDataUrl].slice(0, 3);
                                return { ...prev, images: updatedImages };
                            });
                        };
                    };
                    reader.readAsDataURL(file);
                });
            };

                e.preventDefault();

                    category: newP.category,
                    images: newP.images,
                    description: newP.description

                const { data, error } = await supabase

                if (error) {

                } else {
                    alert(t[lang].successAdd);

                }

            const handlePrevImage = (productId, imagesLength, e) => {
                e.stopPropagation();
                const currentIdx = activeImg[productId] || 0;
                const newIdx = currentIdx === 0 ? imagesLength - 1 : currentIdx - 1;
                setActiveImg({ ...activeImg, [productId]: newIdx });
            };

            const handleNextImage = (productId, imagesLength, e) => {
                e.stopPropagation();
                const currentIdx = activeImg[productId] || 0;
                const newIdx = currentIdx === imagesLength - 1 ? 0 : currentIdx + 1;
                setActiveImg({ ...activeImg, [productId]: newIdx });
            };

                e.preventDefault();
                if (!checkoutName || !checkoutPhone || !checkoutAddress) {
                    alert(t[lang].fillFields);
                    return;
                }

                setIsSubmittingOrder(true);

                const totalAmount = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                const orderSummary = cart.map(i => `${i.name} (Size: ${i.size}) x${i.quantity}`).join(', ');
                const formattedCustomerDetails = `Name: ${checkoutName} | Address: ${checkoutAddress}`;

                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),

                    phone: checkoutPhone,
                    total: totalAmount,
                    method: formattedCustomerDetails
                };

                const { error } = await supabase
                    .from('orders')
                    .insert([newOrderObj]);

                setIsSubmittingOrder(false);

                    alert("Order Submission Error: " + error.message);

                    setCheckoutAddress('');

            const getFilteredProducts = () => {

                                        {/* Executive Statistics overview */}
                                        <div className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 dark:border-stone-800 space-y-4 shadow-sm">
                                            <h3 className="text-lg font-bold text-stone-900 dark:text-white border-b pb-2">📈 {t[lang].analyticsOverview}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl border border-stone-100 dark:border-stone-850">
                                                    <span className="text-[10px] font-extrabold text-stone-400 dark:text-stone-500 uppercase tracking-wider">{t[lang].todaySales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.today.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl border border-stone-100 dark:border-stone-850">
                                                    <span className="text-[10px] font-extrabold text-stone-400 dark:text-stone-500 uppercase tracking-wider">{t[lang].weekSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.week.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl border border-stone-100 dark:border-stone-850">
                                                    <span className="text-[10px] font-extrabold text-stone-400 dark:text-stone-500 uppercase tracking-wider">{t[lang].monthSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.month.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl border border-stone-100 dark:border-stone-850">
                                                    <span className="text-[10px] font-extrabold text-stone-400 dark:text-stone-500 uppercase tracking-wider">{t[lang].yearSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.year.toLocaleString()} ETB</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Orders Log Tracker */}
                                        <div className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 dark:border-stone-800 space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center border-b pb-3">
                                                <h3 className="text-lg font-bold text-stone-900 dark:text-white">📊 {t[lang].ordersTracker}</h3>
                                                {orders.length > 0 && (
                                                    <button onClick={clearOrderLog} className="text-xs text-red-600 bg-red-50 hover:bg-red-100 dark:bg-red-950 dark:hover:bg-red-900 px-3 py-1.5 rounded-lg font-bold transition-all">{t[lang].clearOrders}</button>
                                                )}
                                            </div>
                                            {orders.length === 0 ? (
                                                <p className="text-xs text-stone-500">{t[lang].noOrders}</p>
                                            ) : (
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left text-xs border-collapse">
                                                        <thead>
                                                            <tr className="bg-stone-50 dark:bg-stone-950 text-stone-600 dark:text-stone-400 border-b border-stone-100 dark:border-stone-850">
                                                                <th className="p-3">{t[lang].orderDate}</th>
                                                                <th className="p-3">{t[lang].phoneNumber}</th>
                                                                <th className="p-3">{t[lang].customerOrder}</th>
                                                                <th className="p-3 text-right">{t[lang].total}</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-stone-100 dark:divide-stone-800">
                                                            {orders.map(o => (
                                                                <tr key={o.id} className="hover:bg-stone-50/50 dark:hover:bg-stone-850/50">
                                                                    <td className="p-3 font-medium text-stone-500 whitespace-nowrap">{o.date}</td>
                                                                    <td className="p-3 font-bold text-amber-900 dark:text-amber-500">{o.phone}</td>
                                                                    <td className="p-3 text-stone-700 dark:text-stone-300">{o.items} <span className="text-[11px] block text-amber-800 dark:text-amber-500 font-semibold mt-1">{o.method}</span></td>
                                                                    <td className="p-3 text-right font-bold text-stone-900 dark:text-white whitespace-nowrap">{o.total.toLocaleString()} ETB</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>

                                        {/* Register Product Form */}
                                        <form onSubmit={handleAdd} className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 dark:border-stone-800 space-y-4 shadow-sm">
                                            <h3 className="text-lg font-bold text-stone-900 dark:text-white border-b pb-3">{t[lang].addNewProduct}</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase mb-2">{t[lang].shoeName}</label>
                                                    <input type="text" value={newP.name} onChange={(e) => setNewP({...newP, name: e.target.value})} className="w-full px-4 py-2.5 border border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-white rounded-xl text-sm" placeholder="Classic Oxford" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase mb-2">{t[lang].price}</label>
                                                    <input type="number" value={newP.price} onChange={(e) => setNewP({...newP, price: e.target.value})} className="w-full px-4 py-2.5 border border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-white rounded-xl text-sm" placeholder="3500" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase mb-2">{t[lang].category}</label>
                                                    <select value={newP.category} onChange={(e) => setNewP({...newP, category: e.target.value})} className="w-full px-4 py-2.5 border border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-white rounded-xl text-sm bg-white">
                                                        <option value="Formal">{t[lang].formal}</option>
                                                        <option value="Boots">{t[lang].boots}</option>
                                                        <option value="Sneakers">{t[lang].sneakers}</option>
                                                        <option value="Loafers">{t[lang].loafers}</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase mb-2">{t[lang].imagesLabel}</label>
                                                    <input type="file" accept="image/*" multiple onChange={handleImgUpload} className="w-full text-xs text-stone-500" />
                                                    <p className="text-[10px] text-amber-800 dark:text-amber-500 mt-1.5">{t[lang].imagesSelected} {newP.images.length}</p>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase mb-2">{t[lang].description}</label>
                                                <textarea value={newP.description} onChange={(e) => setNewP({...newP, description: e.target.value})} rows="2" className="w-full px-4 py-2.5 border border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-800 text-stone-900 dark:text-white rounded-xl text-sm"></textarea>
                                            </div>
                                            <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-8 py-3 rounded-xl transition-all shadow">{t[lang].registerBtn}</button>
                                        </form>

                                        {/* Existing products list */}
                                        <div className="space-y-3">
                                            <h3 className="text-lg font-bold text-stone-900 dark:text-white">{t[lang].productList} ({products.length})</h3>
                                            <div className="space-y-2.5">
                                                {products.map(p => (
                                                    <div key={p.id} className="bg-white dark:bg-stone-900 p-4 rounded-2xl border border-stone-200 dark:border-stone-800 flex items-center justify-between gap-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={p.images[0]} className="w-12 h-12 object-cover rounded-xl border border-stone-100 dark:border-stone-800" />
                                                            <div>
                                                                <h4 className="font-bold text-stone-900 dark:text-white text-sm">{p.name}</h4>
                                                                <p className="text-xs text-stone-500">{p.category} • {p.price.toLocaleString()} ETB</p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => handleDeleteProduct(p.id)} className="text-red-600 text-xs font-bold bg-red-50 hover:bg-red-100 dark:bg-red-950 dark:hover:bg-red-900 px-4 py-2 rounded-xl transition-all">{t[lang].delete}</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Footer Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-stone-900/95 backdrop-blur-md border-t border-stone-200/80 dark:border-stone-800 py-3.5 px-6 flex justify-between items-center z-40 md:hidden shadow-xl">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'home' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">🏠</span>{t[lang].home}
                        </button>
                        <button onClick={() => { setSelectedCategory('All'); setSearchQuery(''); setView('shop'); }} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'shop' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">👟</span>{t[lang].shoes}
                        </button>
                        
                        {/* Dark/Light mode switcher */}
                        <button onClick={() => setDarkMode(!darkMode)} className="flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider text-stone-400">
                            <span className="text-lg">{darkMode ? '☀️' : '🌙'}</span>
                            <span>{darkMode ? 'Light' : 'Dark'}</span>
                        </button>

                        <button onClick={() => { setView('cart'); setOrderCompleted(false); setCheckoutMode(null); }} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'cart' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">🛒</span>{t[lang].cart}
                        </button>
                    </nav>

                    {/* Desktop Floating Mode Button */}
                    <button onClick={() => setDarkMode(!darkMode)} className="hidden md:flex fixed bottom-6 right-6 bg-stone-900 dark:bg-white text-white dark:text-stone-950 w-12 h-12 rounded-full items-center justify-center shadow-lg z-50 transition-all">
                        {darkMode ? '☀️' : '🌙'}
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
