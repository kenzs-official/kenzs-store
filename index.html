                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold uppercase tracking-wider mb-2">{t[lang].deliveryAddress}</label>
                                                            <input required type="text" value={checkoutAddress} onChange={(e) => setCheckoutAddress(e.target.value)} placeholder="Addis Ababa, Bole" className="w-full px-4 py-2.5 border rounded-xl text-sm bg-white dark:bg-stone-800 text-stone-950 dark:text-white" />
                                                        </div>
                                                    </div>
                                                    <button type="submit" disabled={isSubmittingOrder} className="w-full bg-amber-950 text-white font-bold py-4 rounded-xl text-xs">
                                                        {isSubmittingOrder ? t[lang].submitting : t[lang].placeOrder}
                                                    </button>
                                                </form>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-8 animate-fadeIn">
                                <h2 className="text-3xl font-bold text-stone-900 dark:text-white">{t[lang].controlPanel}</h2>
                                {!isAdmin ? (
                                    <form onSubmit={handleLogin} className="bg-white dark:bg-stone-900 p-8 rounded-3xl border border-stone-200 max-w-sm mx-auto space-y-5 shadow-lg">
                                        <div>
                                            <label className="block text-xs font-bold text-stone-700 dark:text-stone-300 uppercase tracking-wider mb-2">{t[lang].accessKey}</label>
                                            <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} className="w-full px-4 py-3 border border-stone-300 dark:border-stone-700 rounded-xl text-sm bg-white dark:bg-stone-800 text-stone-900 dark:text-white" placeholder="••••••••" />
                                        </div>
                                        {err && <p className="text-xs text-red-600 font-medium">{err}</p>}
                                        <button type="submit" className="w-full bg-amber-950 text-white text-xs font-bold py-3 rounded-xl">{t[lang].unlock}</button>
                                    </form>
                                ) : (
                                    <div className="space-y-8">
                                        <div className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 space-y-4 shadow-sm">
                                            <h3 className="text-lg font-bold border-b pb-2">📈 {t[lang].analyticsOverview}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl">
                                                    <span className="text-[10px] font-extrabold text-stone-400 uppercase">{t[lang].todaySales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.today.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl">
                                                    <span className="text-[10px] font-extrabold text-stone-400 uppercase">{t[lang].weekSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.week.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl">
                                                    <span className="text-[10px] font-extrabold text-stone-400 uppercase">{t[lang].monthSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.month.toLocaleString()} ETB</p>
                                                </div>
                                                <div className="bg-stone-50 dark:bg-stone-950 p-4 rounded-2xl">
                                                    <span className="text-[10px] font-extrabold text-stone-400 uppercase">{t[lang].yearSales}</span>
                                                    <p className="text-lg font-bold text-stone-900 dark:text-white mt-1">{stats.year.toLocaleString()} ETB</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center border-b pb-3">
                                                <h3 className="text-lg font-bold">📊 {t[lang].ordersTracker}</h3>
                                                {orders.length > 0 && (
                                                    <button onClick={clearOrderLog} className="text-xs text-red-650 bg-red-50 px-3 py-1.5 rounded-lg font-bold">{t[lang].clearOrders}</button>
                                                )}
                                            </div>
                                            {orders.length === 0 ? (
                                                <p className="text-xs text-stone-500">{t[lang].noOrders}</p>
                                            ) : (
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left text-xs border-collapse">
                                                        <thead>
                                                            <tr className="bg-stone-50 dark:bg-stone-950 text-stone-600 border-b">
                                                                <th className="p-3">{t[lang].orderDate}</th>
                                                                <th className="p-3">{t[lang].phoneNumber}</th>
                                                                <th className="p-3">{t[lang].customerOrder}</th>
                                                                <th className="p-3 text-right">{t[lang].total}</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y">
                                                            {orders.map(o => (
                                                                <tr key={o.id}>
                                                                    <td className="p-3 text-stone-500">{o.date}</td>
                                                                    <td className="p-3 font-bold text-amber-900">{o.phone}</td>
                                                                    <td className="p-3">{o.items} <span className="text-[11px] block text-amber-800 font-semibold mt-1">{o.method}</span></td>
                                                                    <td className="p-3 text-right font-bold">{o.total.toLocaleString()} ETB</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>

                                        <form onSubmit={handleAdd} className="bg-white dark:bg-stone-900 p-6 rounded-3xl border border-stone-200 space-y-4 shadow-sm">
                                            <h3 className="text-lg font-bold border-b pb-3">{t[lang].addNewProduct}</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-2">{t[lang].shoeName}</label>
                                                    <input type="text" value={newP.name} onChange={(e) => setNewP({...newP, name: e.target.value})} className="w-full px-4 py-2.5 border bg-white dark:bg-stone-800 rounded-xl text-sm" placeholder="Classic Oxford" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-2">{t[lang].price}</label>
                                                    <input type="number" value={newP.price} onChange={(e) => setNewP({...newP, price: e.target.value})} className="w-full px-4 py-2.5 border bg-white dark:bg-stone-800 rounded-xl text-sm" placeholder="3500" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-2">{t[lang].category}</label>
                                                    <select value={newP.category} onChange={(e) => setNewP({...newP, category: e.target.value})} className="w-full px-4 py-2.5 border bg-white dark:bg-stone-800 rounded-xl text-sm">
                                                        <option value="Formal">{t[lang].formal}</option>
                                                        <option value="Boots">{t[lang].boots}</option>
                                                        <option value="Sneakers">{t[lang].sneakers}</option>
                                                        <option value="Loafers">{t[lang].loafers}</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-2">{t[lang].imagesLabel}</label>
                                                    <input type="file" accept="image/*" multiple onChange={handleImgUpload} className="w-full text-xs text-stone-500" />
                                                    <p className="text-[10px] text-amber-800 mt-1.5">{t[lang].imagesSelected} {newP.images.length}</p>
                                                </div>
                                            </div>
                                            
                                            <div className="flex items-center gap-2 py-2">
                                                <input type="checkbox" id="is_featured" checked={newP.is_featured} onChange={(e) => setNewP({...newP, is_featured: e.target.checked})} className="w-4 h-4 text-amber-850 accent-amber-855 rounded" />
                                                <label htmlFor="is_featured" className="text-xs font-bold text-stone-750 uppercase select-none">{t[lang].makeFeatured}</label>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-stone-700 uppercase mb-2">{t[lang].description}</label>
                                                <textarea value={newP.description} onChange={(e) => setNewP({...newP, description: e.target.value})} rows="2" className="w-full px-4 py-2.5 border bg-white dark:bg-stone-850 rounded-xl text-sm"></textarea>
                                            </div>
                                            <button type="submit" className="bg-emerald-600 text-white text-xs font-bold px-8 py-3 rounded-xl">{t[lang].registerBtn}</button>
                                        </form>

                                        <div className="space-y-3">
                                            <h3 className="text-lg font-bold">{t[lang].productList} ({products.length})</h3>
                                            <div className="space-y-2.5">
                                                {products.map(p => (
                                                    <div key={p.id} className="bg-white dark:bg-stone-900 p-4 rounded-2xl border border-stone-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={p.images[0]} className="w-12 h-12 object-cover rounded-xl" />
                                                            <div>
                                                                <h4 className="font-bold text-stone-900 dark:text-white text-sm">{p.name} {p.is_featured && <span className="text-[9px] bg-amber-855 text-white font-bold px-1.5 py-0.5 rounded ml-1.5">FEATURED</span>}</h4>
                                                                <p className="text-xs text-stone-500">{p.category} • {p.price.toLocaleString()} ETB</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2 justify-end">
                                                            <button onClick={() => toggleFeaturedStatus(p.id, p.is_featured)} className={`text-[11px] font-bold px-3 py-2 rounded-xl ${p.is_featured ? 'bg-amber-100 text-amber-800' : 'bg-stone-100'}`}>
                                                                {p.is_featured ? t[lang].removeFeatured : t[lang].makeFeatured}
                                                            </button>
                                                            <button onClick={() => handleDeleteProduct(p.id)} className="text-red-600 text-xs font-bold bg-red-50 px-4 py-2 rounded-xl">{t[lang].delete}</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-stone-900/95 backdrop-blur-md border-t border-stone-200/80 dark:border-stone-800 py-3.5 px-6 flex justify-between items-center z-40 md:hidden shadow-xl">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'home' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">🏠</span>{t[lang].home}
                        </button>
                        <button onClick={() => { setSelectedCategory('All'); setSearchQuery(''); setView('shop'); }} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'shop' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">👟</span>{t[lang].shoes}
                        </button>
                        <button onClick={() => setDarkMode(!darkMode)} className="flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider text-stone-400">
                            <span className="text-lg">{darkMode ? '☀️' : '🌙'}</span>
                            <span>{darkMode ? 'Light' : 'Dark'}</span>
                        </button>
                        <button onClick={() => { setView('cart'); setOrderCompleted(false); setCheckoutMode(null); }} className={`flex flex-col items-center gap-1 text-[10px] uppercase font-bold tracking-wider ${view === 'cart' ? 'text-amber-800 dark:text-amber-500' : 'text-stone-400'}`}>
                            <span className="text-lg">🛒</span>{t[lang].cart}
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
