<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenzs Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAF8F5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initialProducts = [
            { 
                id: 1, 
                name: "ክላሲክ ሞንክ ስትራፕ (Classic Monk Strap)", 
                price: 3500, 
                category: "ፎርማል ጫማዎች", 
                images: ["https://images.unsplash.com/photo-1614252369475-531eba835eb1?w=600&auto=format&fit=crop&q=60"], 
                description: "ለማንኛውም መደበኛ ዝግጅት የተሰሩ ምርጥ በእጅ የተሰሩ የቆዳ ጫማዎች።" 
            }
        ];

        function App() {
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState(() => {
                try {
                    const saved = localStorage.getItem('kenzs_p');
                    return saved ? JSON.parse(saved) : initialProducts;
                } catch (e) { return initialProducts; }
            });
            const [cart, setCart] = useState([]);
            const [selectedSizes, setSelectedSizes] = useState({});
            const [activeImg, setActiveImg] = useState({});

            // Admin Security
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState('');
            const [err, setErr] = useState('');
            const [newP, setNewP] = useState({ name: '', price: '', category: 'ፎርማል ጫማዎች', images: [], description: '' });

            useEffect(() => {
                localStorage.setItem('kenzs_p', JSON.stringify(products));
            }, [products]);

            const addToCart = (product) => {
                const size = selectedSizes[product.id] || "39";
                const itemKey = `${product.id}-${size}`;
                
                setCart(prev => {
                    const existing = prev.find(item => item.key === itemKey);
                    if (existing) {
                        return prev.map(item => item.key === itemKey ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, key: itemKey, size: size, quantity: 1 }];
                });
                alert(`${product.name} (መጠን: ${size}) ወደ ቅርጫት ገብቷል!`);
            };

            const updateQty = (key, val) => {
                setCart(prev => prev.map(item => {
                    if (item.key === key) {
                        const n = item.quantity + val;
                        return n > 0 ? { ...item, quantity: n } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === 'kenzs2026') {
                    setIsAdmin(true);
                    setErr('');
                } else {
                    setErr('የይለፍ ቃል የተሳሳተ ነው!');
                }
            };

            const handleImgUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const r = new FileReader();
                    r.onloadend = () => {
                        setNewP(prev => ({ ...prev, images: [...prev.images, r.result].slice(0, 3) }));
                    };
                    r.readAsDataURL(file);
                });
            };

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newP.name || !newP.price || newP.images.length === 0) {
                    alert('እባክዎ ሁሉንም መስኮች ይሙሉ!');
                    return;
                }
                setProducts([{ ...newP, id: Date.now(), price: parseFloat(newP.price) }, ...products]);
                setNewP({ name: '', price: '', category: 'ፎርማል ጫማዎች', images: [], description: '' });
                alert('ምርት በተሳካ ሁኔታ ተጨምሯል!');
            };

            const getOrderMsg = () => {
                let msg = "አዲስ ትዕዛዝ ከ Kenzs Official:\n\n";
                cart.forEach(i => {
                    msg += `- ${i.name}\n  መጠን: ${i.size} | ብዛት: ${i.quantity} | ዋጋ: ${i.price * i.quantity} ETB\n`;
                });
                const tot = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                msg += `\nጠቅላላ ድምር: ${tot} ETB`;
                return msg;
            };

            return (
                <div className="min-h-screen flex flex-col pb-20 md:pb-0">
                    <header className="bg-white border-b border-stone-200 sticky top-0 z-40 px-4 py-4 flex justify-between items-center">
                        <h1 className="text-xl font-bold text-amber-900 cursor-pointer" onClick={() => setView('home')}>KENZS OFFICIAL</h1>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('cart')} className="relative p-2 text-stone-700">
                                🛒 {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-amber-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                            </button>
                            <button onClick={() => setView('admin')} className="bg-stone-100 text-stone-800 px-3 py-1.5 rounded-full text-xs font-semibold border border-stone-200">⚙️ መቆጣጠሪያ</button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-4xl w-full mx-auto p-4">
                        {view === 'home' && (
                            <div className="space-y-8">
                                <div className="text-center py-12 px-4 space-y-4 bg-stone-100 rounded-3xl">
                                    <h2 className="text-3xl font-bold text-stone-900 tracking-tight">በራስ መተማመን ይራመዱ።</h2>
                                    <p className="text-stone-600 text-sm max-w-sm mx-auto">ለማንኛውም ዝግጅት የሚሆኑ የክብር ወንዶች ጫማዎች።</p>
                                    <button onClick={() => setView('shop')} className="bg-amber-800 text-white font-medium px-8 py-3 rounded-full text-sm shadow-md">ካታሎግ ይመልከቱ</button>
                                </div>

                                <div>
                                    <h3 className="text-lg font-bold text-stone-900 mb-4">የተመረጡ ጫማዎች</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {products.slice(0, 4).map(p => {
                                            const idx = activeImg[p.id] || 0;
                                            return (
                                                <div key={p.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                                    <div className="relative w-full h-56 bg-stone-100">
                                                        <img src={p.images[idx] || p.images[0]} className="w-full h-full object-cover" />
                                                        {p.images.length > 1 && (
                                                            <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                                                                {p.images.map((_, i) => (
                                                                    <button key={i} onClick={() => setActiveImg({...activeImg, [p.id]: i})} className={`w-2 h-2 rounded-full ${i === idx ? 'bg-amber-800 scale-125' : 'bg-stone-300'}`}></button>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                        <div>
                                                            <span className="text-xs font-bold text-amber-800 bg-amber-50 px-2 py-1 rounded">{p.category}</span>
                                                            <h4 className="font-bold text-stone-900 text-base mt-2">{p.name}</h4>
                                                            <p className="text-stone-500 text-xs mt-1">{p.description}</p>
                                                            <div className="mt-3">
                                                                <label className="block text-xs font-bold text-stone-600 mb-1">መጠን (Size) ይምረጡ፡</label>
                                                                <div className="flex gap-1.5 flex-wrap">
                                                                    {["39", "40", "41", "42", "43", "44"].map(sz => (
                                                                        <button key={sz} onClick={() => setSelectedSizes({...selectedSizes, [p.id]: sz})} className={`px-2.5 py-1 text-xs font-medium rounded-md border ${(selectedSizes[p.id] || "39") === sz ? 'bg-amber-800 text-white border-amber-800' : 'bg-white text-stone-700 border-stone-200'}`}>{sz}</button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center justify-between pt-2 border-t border-stone-100">
                                                            <span className="text-base font-bold text-stone-900">{p.price} ETB</span>
                                                            <button onClick={() => addToCart(p)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full">ወደ ቅርጫት ጨምር</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'shop' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">ሙሉ ካታሎግ</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {products.map(p => {
                                        const idx = activeImg[p.id] || 0;
                                        return (
                                            <div key={p.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                                                <div className="relative w-full h-56 bg-stone-100">
                                                    <img src={p.images[idx] || p.images[0]} className="w-full h-full object-cover" />
                                                    {p.images.length > 1 && (
                                                        <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                                                            {p.images.map((_, i) => (
                                                                <button key={i} onClick={() => setActiveImg({...activeImg, [p.id]: i})} className={`w-2 h-2 rounded-full ${i === idx ? 'bg-amber-800 scale-125' : 'bg-stone-300'}`}></button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                                                    <div>
                                                        <span className="text-xs font-bold text-amber-800 bg-amber-50 px-2 py-1 rounded">{p.category}</span>
                                                        <h4 className="font-bold text-stone-900 text-base mt-2">{p.name}</h4>
                                                        <p className="text-stone-500 text-xs mt-1">{p.description}</p>
                                                        <div className="mt-3">
                                                            <label className="block text-xs font-bold text-stone-600 mb-1">መጠን (Size) ይምረጡ፡</label>
                                                            <div className="flex gap-1.5 flex-wrap">
                                                                {["39", "40", "41", "42", "43", "44"].map(sz => (
                                                                    <button key={sz} onClick={() => setSelectedSizes({...selectedSizes, [p.id]: sz})} className={`px-2.5 py-1 text-xs font-medium rounded-md border ${(selectedSizes[p.id] || "39") === sz ? 'bg-amber-800 text-white border-amber-800' : 'bg-white text-stone-700 border-stone-200'}`}>{sz}</button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center justify-between pt-2 border-t border-stone-100">
                                                        <span className="text-base font-bold text-stone-900">{p.price} ETB</span>
                                                        <button onClick={() => addToCart(p)} className="bg-stone-900 text-white text-xs font-semibold px-4 py-2 rounded-full">ወደ ቅርጫት ጨምር</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">የእርስዎ የገበያ ቅርጫት</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-12 space-y-4">
                                        <p className="text-stone-500">ቅርጫትዎ ባዶ ነው!</p>
                                        <button onClick={() => setView('shop')} className="bg-stone-900 text-white text-xs font-bold px-6 py-2.5 rounded-full">ወደ ግብይት ተመለስ</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map(item => (
                                            <div key={item.key} className="bg-white p-4 rounded-xl border border-stone-200 flex gap-4 items-center">
                                                <img src={item.images[0]} className="w-16 h-16 object-cover rounded-lg" />
                                                <div className="flex-1">
                                                    <h4 className="font-bold text-stone-900 text-sm">{item.name}</h4>
                                                    <p className="text-stone-500 text-xs">መጠን: <span className="font-bold text-amber-900">{item.size}</span></p>
                                                    <p className="text-stone-500 text-xs">{item.price} ETB x {item.quantity}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => updateQty(item.key, -1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center font-bold">-</button>
                                                    <span className="text-sm font-semibold">{item.quantity}</span>
                                                    <button onClick={() => updateQty(item.key, 1)} className="w-7 h-7 bg-stone-100 rounded-full flex items-center justify-center font-bold">+</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="border-t border-stone-200 pt-4 flex flex-col items-end space-y-3">
                                            <div className="text-right">
                                                <span className="text-stone-500 text-sm">ጠቅላላ ድምር: </span>
                                                <span className="text-xl font-bold text-stone-900">{cart.reduce((s, i) => s + (i.price * i.quantity), 0)} ETB</span>
                                            </div>
                                            <div className="w-full grid grid-cols-2 gap-2">
                                                <button onClick={() => window.open(`https://wa.me/?text=${encodeURIComponent(getOrderMsg())}`, '_blank')} className="bg-emerald-600 text-white font-bold py-3 rounded-xl text-center text-xs shadow">በ WhatsApp እዘዝ</button>
                                                <button onClick={() => window.open(`sms:?body=${encodeURIComponent(getOrderMsg())}`, '_blank')} className="bg-blue-600 text-white font-bold py-3 rounded-xl text-center text-xs shadow">በእጅ ስልክ / SMS እዘዝ</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold text-stone-900">የሱቅ መቆጣጠሪያ ፓነል</h2>
                                {!isAdmin ? (
                                    <form onSubmit={handleLogin} className="bg-white p-6 rounded-2xl border border-stone-200 max-w-sm mx-auto space-y-4 shadow-sm">
                                        <div>
                                            <label className="block text-xs font-bold text-stone-700 uppercase mb-1">የመግቢያ ቁልፍ (Access Key)</label>
                                            <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-amber-800" placeholder="••••••••" />
                                        </div>
                                        {err && <p className="text-xs text-red-600 font-medium">{err}</p>}
                                        <button type="submit" className="w-full bg-amber-900 text-white text-xs font-bold py-2.5 rounded-lg">ክፈት</button>
                                    </form>
                                ) : (
                                    <div className="space-y-8">
                                        <form onSubmit={handleAdd} className="bg-white p-5 rounded-2xl border border-stone-200 space-y-4 shadow-sm">
                                            <h3 className="text-base font-bold text-stone-900 border-b pb-2">አዲስ ጫማ መመዝገቢያ</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">የጫማው ስም *</label>
                                                    <input type="text" value={newP.name} onChange={(e) => setNewP({...newP, name: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="ምሳሌ፡ ቆዳ ጫማ" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ዋጋ (በ Birr) *</label>
                                                    <input type="number" value={newP.price} onChange={(e) => setNewP({...newP, price: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" placeholder="3500" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ክፍል (Category)</label>
                                                    <select value={newP.category} onChange={(e) => setNewP({...newP, category: e.target.value})} className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white">
                                                        <option value="ፎርማል ጫማዎች">ፎርማል ጫማዎች</option>
                                                        <option value="ቡትስ">ቡትስ</option>
                                                        <option value="ስኒከር">ስኒከር</option>
                                                        <option value="ሎፈርስ">ሎፈርስ</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ምስሎች መምረጫ (እስከ 3 ምስል) *</label>
                                                    <input type="file" accept="image/*" multiple onChange={handleImgUpload} className="w-full text-xs text-stone-500" />
                                                    <p className="text-[10px] text-amber-800 mt-1">የተመረጡ ምስሎች፡ {newP.images.length}</p>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-stone-700 uppercase mb-1">ማብራሪያ</label>
                                                <textarea value={newP.description} onChange={(e) => setNewP({...newP, description: e.target.value})} rows="2" className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"></textarea>
                                            </div>
                                            <button type="submit" className="bg-emerald-600 text-white text-xs font-bold px-6 py-2.5 rounded-lg">ምርቱን መዝግብ</button>
                                        </form>

                                        <div className="space-y-3">
                                            <h3 className="text-base font-bold text-stone-900">ያሉ ምርቶች ዝርዝር ({products.length})</h3>
                                            <div className="space-y-2">
                                                {products.map(p => (
                                                    <div key={p.id} className="bg-white p-3 rounded-xl border border-stone-200 flex items-center justify-between gap-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={p.images[0]} className="w-12 h-12 object-cover rounded-lg" />
                                                            <div>
                                                                <h4 className="font-bold text-stone-900 text-sm">{p.name}</h4>
                                                                <p className="text-xs text-stone-500">{p.category} • {p.price} ETB</p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => setProducts(products.filter(item => item.id !== p.id))} className="text-red-600 text-xs font-bold bg-red-50 px-3 py-1.5 rounded-lg">አጥፋ</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 py-2 px-6 flex justify-between items-center z-40 md:hidden shadow-lg">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center text-xs ${view === 'home' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>🏠</span>መነሻ
                        </button>
                        <button onClick={() => setView('shop')} className={`flex flex-col items-center text-xs ${view === 'shop' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>👟</span>ጫማዎች
                        </button>
                        <button onClick={() => setView('cart')} className={`flex flex-col items-center text-xs ${view === 'cart' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>🛒</span>ቅርጫት
                        </button>
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center text-xs ${view === 'admin' ? 'text-amber-800 font-bold' : 'text-stone-500'}`}>
                            <span>⚙️</span>መቆጣጠሪያ
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
